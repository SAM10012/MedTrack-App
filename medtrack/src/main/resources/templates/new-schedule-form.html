<!DOCTYPE html>
<html lang="en" xmlns:th = "https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add New Medicine Schedule</title>
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
          integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO"
          crossorigin="anonymous">
</head>
<body>
<div class="container">
    <h1>MedTrack</h1>
    <hr>
    <h2> Enter the below requested details: </h2>

    <form action = "#" th:action = "@{/schedule/save}" th:object = "${medSchedule}" method = "POST">
        <input type = "text" th:field = "*{userName}" placeholder = "Name of User" class = "form-control mb-4 col-4">
        <input type = "text" th:field = "*{medName}" placeholder = "Name of Medicine" class = "form-control mb-4 col-4">
        <input type = "date" th:field = "*{startDate}" placeholder = "Start Date" class = "form-control mb-4 col-4">
        <input type = "date" th:field = "*{endDate}" placeholder = "End Date" class = "form-control mb-4 col-4">

        <select th:field="*{timeSlot}" class="form-control mb-4 col-4">

            <option value="">Select Time Slot</option>

            <option value="After_Waking_Up">After Waking Up</option>

            <option value="Before_Breakfast">Before Breakfast</option>

            <option value="After_Breakfast">After Breakfast</option>

            <option value="Before_Lunch">Before Lunch</option>

            <option value="After_Lunch">After Lunch</option>

            <option value="Before_Dinner">Before Dinner</option>

            <option value="After_Dinner">After Dinner</option>

            <option value="Before_Night_Sleep">Before Night Sleep</option>

        </select>


        <button type="submit" class="btn btn-info col-2"> Add Med Schedule </button>
    </form>

</div>

</body>
</html>
