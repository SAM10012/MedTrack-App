<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MedTrack</title>

    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">

    <style>

        body{
            background-color:#F8F6FB;   /* off-white */
            font-weight:bold;
            font-family: Arial, sans-serif;
        }

        h1{
            color:#6A0DAD;  /* purple */
            text-align:center;
            margin-bottom:40px;
            font-weight:bold
        }

        .button-container{
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:20px;
        }

        .med-btn{
            background-color:#E3CCFF;  /* light purple */
            border:none;
            border-radius:25px;
            padding:12px 25px;
            width:260px;
            text-align:center;
            font-weight:bold;
            color:black
        }

        .med-btn:hover{
            background-color:#B98AEF;
        }

    </style>

</head>

<body>

<div class="container my-5">

    <h1>Welcome to MedTrack</h1>

    <div class="button-container">

        <a th:href="@{/schedule/new}" class="btn med-btn">
            Add New Medicine Schedule
        </a>

        <a th:href="@{/schedules/view}" class="btn med-btn">
            View Medicine Schedules
        </a>

        <a th:href="@{/med-intake-logs/view}" class="btn med-btn">
            View Med Intake Logs
        </a>

    </div>

</div>

</body>
</html>
