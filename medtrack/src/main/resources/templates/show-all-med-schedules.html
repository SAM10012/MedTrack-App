<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>MedTrack</title>

    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
          integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO"
          crossorigin="anonymous">
</head>
<body>

<div  class = "container my-2">

    <h1>Medicine Schedules</h1>
    <table border="1" class = "table table-striped table-responsive-md" >
        <thead >
        <tr>
            <th>User Name</th>
            <th>Med Name</th>
            <th>Start Date</th>
            <th>End Date</th>
            <th>Time Slot</th>
            <th>Actions</th>
        </tr>

        </thead>
        <tbody>
        <tr th:each = "scheduleInfo : ${allMedSchedules}">
            <td th:text = "${scheduleInfo.userName}"> </td>
            <td th:text = "${scheduleInfo.medName}"> </td>
            <td th:text = "${scheduleInfo.startDate}"> </td>
            <td th:text = "${scheduleInfo.endDate}"> </td>
            <td th:text = "${scheduleInfo.timeSlot}"></td>
            <td> <a th:href = "@{/update-schedule/{id}(id=${scheduleInfo.scheduleId})}" class = "btn btn-primary">Update</a>
                <a th:href = "@{/delete-schedule/{id}(id=${scheduleInfo.scheduleId})}" class = "btn btn-danger">Delete</a></td>

        </tr>
        </tbody>
    </table></div>
</body>
</html>
