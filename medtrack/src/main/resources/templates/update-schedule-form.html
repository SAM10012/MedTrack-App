<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Update Medicine Schedule</title>

    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">

    <style>

        body{
            background-color:#F8F6FB;
            font-weight:bold;
            font-family:Arial, sans-serif;
        }

        .container{
            max-width:500px;
            margin:auto;
            text-align:center;
            margin-top:40px;
        }

        h1{
            color:#6A0DAD;
            margin-bottom:10px;
            font-weight:bold;
        }

        h2{
            color:#6A0DAD;
            font-size:22px;
            margin-bottom:30px;
            font-weight:bold;
        }

        .form-control{
            border-radius:10px;
            text-align:center;
            font-weight:bold;
        }

        .med-btn{
            background-color:#CFA6FF;
            border:none;
            border-radius:25px;
            padding:12px 30px;
            color:black;
            font-weight:bold;
            width:60%;
        }

        .med-btn:hover{
            background-color:#B98AEF;
            color:black;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>MedTrack</h1>
    <hr>

    <h2>Update your Medicine Schedule Details</h2>

    <form action="#" th:action="@{/schedule/save}" th:object="${medSchedule}" method="POST">

        <input type="hidden" th:field="*{scheduleId}" />

        <input type="text"
               th:field="*{userName}"
               class="form-control mb-4"
               placeholder="Name of User">

        <input type="text"
               th:field="*{medName}"
               class="form-control mb-4"
               placeholder="Name of Medicine">

        <input type="date"
               th:field="*{startDate}"
               class="form-control mb-4">

        <input type="date"
               th:field="*{endDate}"
               class="form-control mb-4">

        <select th:field="*{timeSlot}" class="form-control mb-4">

            <option value="">Select Time Slot</option>

            <option value="After_Waking_Up">After Waking Up</option>
            <option value="Before_Breakfast">Before Breakfast</option>
            <option value="After_Breakfast">After Breakfast</option>
            <option value="Before_Lunch">Before Lunch</option>
            <option value="After_Lunch">After Lunch</option>
            <option value="Before_Dinner">Before Dinner</option>
            <option value="After_Dinner">After Dinner</option>
            <option value="Before_Night_Sleep">Before Night Sleep</option>

        </select>

        <button type="submit" class="btn med-btn">
            Update Med Schedule
        </button>

    </form>

</div>

</body>
</html>
