<!DOCTYPE html>
<html lang="en" xmlns:th = "https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MedTrack</title>
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
          integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO"
          crossorigin="anonymous">
</head>
<body>
<div class="container">
    <h1>MedTrack</h1>
    <hr>
    <h2> Update your Medicine Schedule Details: </h2>

    <form action = "#" th:action = "@{/schedule/save}" th:object = "${medSchedule}" method = "POST">

        <input type = "hidden" th:field = "*{scheduleId}" />
        <input type = "text" th:field = "*{userName}"  class = "form-control mb-4 col-4">
        <input type = "text" th:field = "*{medName}"  class = "form-control mb-4 col-4">
        <input type = "date" th:field = "*{startDate}"  class = "form-control mb-4 col-4">
        <input type = "date" th:field = "*{endDate}"  class = "form-control mb-4 col-4">

        <select th:field="*{timeSlot}" class="form-control mb-4 col-4">
            <option th:value="After_Waking_Up">After Waking Up</option>
            <option th:value="Before_Breakfast">Before Breakfast</option>
            <option th:value="After_Breakfast">After Breakfast</option>
            <option th:value="Before_Lunch">Before Lunch</option>
            <option th:value="After_Lunch">After Lunch</option>
            <option th:value="Before_Dinner">Before Dinner</option>
            <option th:value="After_Dinner">After Dinner</option>
            <option th:value="Before_Night_Sleep">Before Night Sleep</option>
        </select>


        <button type="submit" class="btn btn-info col-2"> Update Med Schedule </button>
    </form>

</div>

</body>
</html>
