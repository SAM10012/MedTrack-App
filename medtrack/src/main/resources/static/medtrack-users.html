<!DOCTYPE html>
<html>
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Medtrack</title>

    <style>

        body{
        font-family: Arial;
        background:#FDFDFD;
        padding:20px;
        display:flex;
        flex-direction:column;
        align-items:center;
        font-weight:bold;
        }

        h1{
        color:#4B0082;
        font-weight:bold;
        }

        #users-container{
        display:flex;
        flex-direction:column;
        gap:10px;
        width:100%;
        max-width:500px;
        }

        .user-btn{
        border:none;
        border-radius:12px;
        padding:12px;
        background:#E0BBFF;
        color:#4B0082;
        cursor:pointer;
        font-size:1rem;
        font-weight:bold;
        }

    </style>

</head>

<body>

<h1>Welcome to Medtrack</h1>

<div id="users-container"></div>

<script>

    fetch('http://localhost:8080/medtrack/users')
    .then(res=>res.json())
    .then(users=>{

    const container=document.getElementById("users-container");

    users.forEach(user=>{

    const btn=document.createElement("button");

    btn.classList.add("user-btn");
    btn.textContent=user.userName;

    btn.onclick=()=>{

    window.location.href=
    `medtrack-meds.html?user=${user.userName}`;

    };

    container.appendChild(btn);

    });

    });

</script>

</body>
</html>
